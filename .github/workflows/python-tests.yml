name: Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r receiver/python/requirements.txt
          pip install -r simulation/python/requirements.txt
      - name: Run tests
        run: |
          set +e
          pytest -q
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No tests collected yet."
            exit 0
          fi
          exit "$code"

