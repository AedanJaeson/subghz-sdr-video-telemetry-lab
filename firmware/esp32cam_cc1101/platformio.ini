; PlatformIO configuration placeholder.
; Board choice and libraries must be verified against the actual ESP32-CAM and CC1101 modules.

[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
upload_port = COM4
monitor_port = COM4
upload_speed = 115200
monitor_speed = 115200
monitor_filters =
  time
lib_deps =
  jgromes/RadioLib@^7.7.0
build_flags =
  -D CC1101_TRANSMIT_ENABLED=0
  -D CC1101_FREQ_MHZ=433.92
  -D CC1101_OUTPUT_POWER_DBM=-10
